name: Build and Push Docker Image

on:
  schedule:
    # Check for upstream changes nightly at 2am UTC
    - cron: "0 2 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Fetch latest upstream
        run: |
          git remote add upstream https://github.com/MistWeatherMedia/weatherstar-xl.git
          git fetch upstream main
          # Merge upstream changes; fail loudly if there are conflicts
          git merge upstream/main --allow-unrelated-histories --no-edit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
